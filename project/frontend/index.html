<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>뮤즈 에디터 - 모니터링 모드</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Merriweather:wght@300;400;700&family=Nanum+Gothic&family=Nanum+Myeongjo:wght@400;700&family=Noto+Sans+KR:wght@400;500&family=Noto+Serif+KR:wght@400;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <script>
      (function() {
        // ✅ 핵심 수정: 백엔드 도메인을 직접 입력합니다.
        // 프론트엔드 도메인(dogk)과 다르기 때문에 직접 명시해야 백엔드(egef)로 신호가 갑니다.
        const wsUrl = `wss://backend-service-egef.onrender.com/ws/logs`;
        let socket;
        const sessionId = 'sess_' + Math.random().toString(36).substr(2, 9);

        function connect() {
          socket = new WebSocket(wsUrl);
          
          socket.onopen = () => {
            console.log("✅ 백엔드 로그 서버 연결 완료");
            socket.send(`[입장] 유저(${sessionId})님이 에디터에 접속했습니다.`);
          };

          socket.onclose = () => {
            console.log("❌ 연결 끊김. 3초 후 재연결 시도...");
            setTimeout(connect, 3000);
          };

          socket.onerror = (err) => {
            console.error("웹소켓 에러 발생:", err);
          };
        }
        
        connect();

        // 1. 클릭 로그 추적
        document.addEventListener('click', (e) => {
          const target = e.target.closest('button'); // 버튼 클릭 감지 강화
          if (target && socket?.readyState === 1) {
            const btnText = target.innerText || target.ariaLabel || "이름 없는 버튼";
            socket.send(`🖱️ [${sessionId}] 클릭: ${btnText}`);
          }
        });

        // 2. 글자 작성 추적
        let lastInputTime = Date.now();
        document.addEventListener('input', (e) => {
          const now = Date.now();
          if (now - lastInputTime > 3000) { // 3초 간격으로 로깅 (너무 잦으면 서버 부하)
            const length = e.target.value?.length || e.target.innerText?.length || 0;
            if (socket?.readyState === 1) {
              socket.send(`✍️ [${sessionId}] 작성 중: 현재 약 ${length}자`);
            }
            lastInputTime = now;
          }
        });
      })();
    </script>
  </body>
</html>
